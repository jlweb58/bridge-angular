<div class="page">
  <mat-toolbar class="topbar" role="banner">
    <a mat-button class="brand" routerLink="/">Bridge Hand Analysis</a>

    <span class="spacer"></span>

    <nav class="menu" aria-label="Main menu">
      <a class="menu-link" mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Analyzer</a>
      <a class="menu-link" mat-button routerLink="/contact" routerLinkActive="active-link">Contact &amp; Legal</a>
      <a class="menu-link" mat-button routerLink="/privacy" routerLinkActive="active-link">Privacy</a>
      <a class="menu-link" mat-button routerLink="/about" routerLinkActive="active-link">About</a>
    </nav>
  </mat-toolbar>
  <mat-card class="content-card">
    <mat-card-content>
      <router-outlet />

      <footer class="footer" role="contentinfo">
        <div class="footer-inner">
          <div class="footer-credits">
            Single-dummy analysis powered by the DDS library by Bo Haglund / Soren Hein:
            <a href="https://github.com/dds-bridge/dds/" target="_blank" rel="noopener noreferrer">github.com/dds-bridge/dds</a>
          </div>
        </div>
      </footer>
    </mat-card-content>
  </mat-card>

</div>
