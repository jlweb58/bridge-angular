<div class="page">
  <mat-toolbar class="topbar" role="banner">
    <button
      mat-button
      class="mobile-menu-trigger"
      [matMenuTriggerFor]="mobileMenu"
      aria-label="Open navigation menu">
      <mat-icon aria-hidden="true">menu</mat-icon>
    </button>

    <span class="brand" >Bridge Tools</span>


    <span class="spacer"></span>

    <nav class="desktop-menu" aria-label="Main menu">
      <a class="menu-link" mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Analyzer</a>
      <a class="menu-link" mat-button routerLink="/hand-generation" routerLinkActive="active-link">Generate Hands</a>
      <a class="menu-link" mat-button routerLink="/contact" routerLinkActive="active-link">Contact &amp; Legal</a>
      <a class="menu-link" mat-button routerLink="/privacy" routerLinkActive="active-link">Privacy</a>
      <a class="menu-link" mat-button routerLink="/links" routerLinkActive="active-link">Links</a>
      <a class="menu-link" mat-button routerLink="/faq" routerLinkActive="active-link">FAQ</a>
      <a class="menu-link" mat-button routerLink="/about" routerLinkActive="active-link">About</a>
    </nav>
  </mat-toolbar>

  <mat-menu #mobileMenu="matMenu" class="mobile-menu-panel">
    <button mat-menu-item disabled class="menu-section">Tools</button>
    <a mat-menu-item routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
      Analyzer
    </a>
    <a mat-menu-item routerLink="/hand-generation" routerLinkActive="active-link">
      Generate Hands
    </a>

    <mat-divider></mat-divider>

    <button mat-menu-item disabled class="menu-section">More</button>
    <a mat-menu-item routerLink="/faq" routerLinkActive="active-link">
      FAQ
    </a>
    <a mat-menu-item routerLink="/about" routerLinkActive="active-link">
      About
    </a>
    <a mat-menu-item routerLink="/links" routerLinkActive="active-link">
      Links
    </a>
    <a mat-menu-item routerLink="/privacy" routerLinkActive="active-link">
      Privacy
    </a>
    <a mat-menu-item routerLink="/contact" routerLinkActive="active-link">
      Contact &amp; Legal
    </a>
  </mat-menu>

  <mat-card class="content-card">
    <mat-card-content>
      <router-outlet />

      <footer class="footer" role="contentinfo">
        <div class="footer-inner">
          <div class="footer-credits">
            Single-dummy analysis powered by the DDS library by Bo Haglund / Soren Hein:
            <a href="https://github.com/dds-bridge/dds/" target="_blank" rel="noopener noreferrer">github.com/dds-bridge/dds</a>
          </div>
        </div>
      </footer>
    </mat-card-content>
  </mat-card>

</div>
