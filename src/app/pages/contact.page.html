<section class="panel">
  <h1>Contact</h1>

  <p>
    <strong>{{ fullName }}</strong>
  </p>

  <p>
    Email:
    <a href="#" (click)="onEmailClick($event)" aria-label="Send email">
      <code>{{ emailText() }}</code>
    </a>
    <button class="inline-gap-left" type="button" (click)="copyEmailToClipboard()">Copy</button>
    @if (copied) {
      <span class="muted small">Copied</span>
    }
  </p>

  <p class="muted small">
    If clicking the email does nothing, your browser may not have an email app configured. Use “Copy” instead.
  </p>

  <p>
    LinkedIn:
    <a [href]="linkedInUrl" target="_blank" rel="noopener noreferrer">Profile</a>
  </p>
</section>
