<div class="card player-card" [class.advanced-player-card]="mode() === 'advanced'">
  <div class="player-card-header">
    <h2>{{ title() }}</h2>

    <div class="mode-tabs" role="tablist" [attr.aria-label]="title() + ' constraint mode'">
      <button
        type="button"
        class="mode-tab"
        [class.active]="mode() === 'basic'"
        (click)="modeChange.emit('basic')"
      >
        Basic
      </button>
      <button
        type="button"
        class="mode-tab"
        [class.active]="mode() === 'advanced'"
        (click)="modeChange.emit('advanced')"
        matTooltip="Advanced mode allows you to specify complex suit-length constraints (experts only)"
      >
        Advanced
      </button>
    </div>
  </div>

  <div class="grid grid-2 compact">
    <label class="field">
      <span>Min HCP</span>
      <input
        type="number"
        min="0"
        max="37"
        [ngModel]="minPoints()"
        (ngModelChange)="minPointsChange.emit($event)"
      />
    </label>
    <label class="field">
      <span>Max HCP</span>
      <input
        type="number"
        min="0"
        max="37"
        [ngModel]="maxPoints()"
        (ngModelChange)="maxPointsChange.emit($event)"
      />
    </label>
  </div>

  @if (mode() === 'basic') {
    <div class="suit-grid">
      @for (suit of suitChars(); track suit) {
        <div class="suit-row">
          <div class="suit-label" [class.red-suit]="isRedSuit(suit)">
            {{ suitSymbol(suit) }}
          </div>
          <label class="field inline">
            <span>Min</span>
            <input
              type="number"
              min="0"
              max="13"
              [ngModel]="suitRanges()[suit].min"
              (ngModelChange)="suitMinChange.emit({ suit, value: $event })"
            />
          </label>
          <label class="field inline">
            <span>Max</span>
            <input
              type="number"
              min="0"
              max="13"
              [ngModel]="suitRanges()[suit].max"
              (ngModelChange)="suitMaxChange.emit({ suit, value: $event })"
            />
          </label>
        </div>
      }
    </div>
  } @else {
    <app-advanced-query-builder
      [query]="query()"
      [suitOptions]="suitOptions()"
      (addRule)="addRule.emit($event)"
      (addGroup)="addGroup.emit($event)"
      (removeNode)="removeNode.emit($event)"
      (groupOperatorChange)="groupOperatorChange.emit($event)"
      (ruleSuitChange)="ruleSuitChange.emit($event)"
      (ruleMinChange)="ruleMinChange.emit($event)"
      (ruleMaxChange)="ruleMaxChange.emit($event)"
    />
  }
</div>
